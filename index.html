<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixie Unblocked Games | Classroom 6x Style</title>
    <style>
        /* Modern, Dark Aesthetic */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2d2d2d;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #00bc8c;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00bc8c;
            text-transform: uppercase;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-size: 0.9rem;
        }

        /* The Game Grid */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: #333;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-align: center;
            border: 1px solid #444;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 188, 140, 0.4);
            border-color: #00bc8c;
        }

        .game-thumbnail {
            width: 100%;
            height: 130px;
            background-color: #444; /* Placeholder color */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-title {
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Pixie Unblocked</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">New Games</a>
        <a href="#">Top Rated</a>
    </nav>
</header>

<div class="container">
    <div class="game-grid">
        <div class="game-card">
            <div class="game-thumbnail">🎮</div>
            <div class="game-title">Slope</div>
        </div>

        <div class="game-card">
            <div class="game-thumbnail">🏎️</div>
            <div class="game-title">Madalin Stunt Cars</div>
        </div>

        <div class="game-card">
            <div class="game-thumbnail">🏃</div>
            <div class="game-title">Run 3</div>
        </div>

        <div class="game-card">
            <div class="game-thumbnail">🏀</div>
            <div class="game-title">Basketball Stars</div>
        </div>
        
        </div>
</div>

<footer>
    &copy; 2026 Pixie Unblocked Games - Inspired by Classroom 6x
</footer>

</body>
</html>
